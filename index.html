        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        /* Post-Render Dynamic Machine Translation Engine (MyMemory Translation API) */
        async function runAutoMachineTranslation(targetLang) {
            if (targetLang === 'id') {
                // Pulihkan teks asli Indonesia secara instan dari DOM asli / cache
                const translateElements = document.querySelectorAll('.translate-dynamic');
                translateElements.forEach(el => {
                    const originalId = el.getAttribute('data-id-text');
                    if (originalId) {
                        el.textContent = originalId;
                        el.classList.remove('translate-loading');
                    }
                });
                return;
            }

            const translateElements = document.querySelectorAll('.translate-dynamic');
            translateElements.forEach(async (el) => {
                const originalText = el.textContent.trim();
                if (!originalText) return;

                // Set id text jika belum diset
                if (!el.getAttribute('data-id-text')) {
                    el.setAttribute('data-id-text', originalText);
                }

                const cacheKey = `ST_TRANS_${originalText.substring(0, 40).replace(/[^a-zA-Z0-9]/g, "_")}`;
                const cachedTranslation = localStorage.getItem(cacheKey);

                if (cachedTranslation) {
                    el.textContent = cachedTranslation;
                    return;
                }

                // Berikan animasi denyut kemewahan saat loading translation
                el.classList.add('translate-loading');

                try {
                    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(originalText)}&langpair=id|en`);
                    const data = await response.json();
                    if (data.responseData && data.responseData.translatedText) {
                        const translation = data.responseData.translatedText;
                        localStorage.setItem(cacheKey, translation);
                        el.textContent = translation;
                    }
                } catch (error) {
                    console.warn("Auto translation engine throttling. Fallback to original text.");
                } finally {
                    el.classList.remove('translate-loading');
                }
            });
        }

        };

    <script>
        /* ==========================================================================
           4. ROUTER & SYSTEM CONTROLLER ENGINE
           ========================================================================== */
        const App = {
            root: document.getElementById('app-root'),
            header: document.getElementById('header-container'),
            footer: document.getElementById('footer-container'),
            loader: document.getElementById('loader'),

            async init() {
                await AppState.init();

                this.header.innerHTML = Components.Header();
                this.footer.innerHTML = Components.Footer();
                
                const cleanNumber = window.getCleanWhatsAppNumber(AppState.site.whatsapp);
                const floatingWa = document.getElementById('floating-wa');
                if (floatingWa) {
                    floatingWa.href = `https://wa.me/${cleanNumber}?text=Halo Sibling Tours, saya ingin menanyakan tentang paket tour premium ke Labuan Bajo.`;
                }

                window.addEventListener('hashchange', () => this.handleRoute());
                window.addEventListener('scroll', this.handleScroll);
                this.handleRoute();
            },

            async handleRoute() {
                this.showLoader();
                const hash = window.location.hash || '#home';
                const parts = hash.split('/');
                const route = parts[0];
                const param = parts[1];

                // Smooth Screen Transition Effect
                this.root.style.opacity = '0';

                setTimeout(async () => {
                    if (route === '#home') {
                        this.root.innerHTML = Components.Home();
                    } else if (route === '#tours') {
                        this.root.innerHTML = Components.Home();
                        setTimeout(() => {
                            const section = document.getElementById('tours');
                            if (section) section.scrollIntoView({ behavior: 'smooth' });
                        }, 200);
                    } else if (route === '#tour' && param) {
                        const targetTour = AppState.tours.find(t => t.id === param || t.slug === param);
                        if (targetTour) {
                            this.root.innerHTML = Components.TourDetails(targetTour);
                        } else {
                            this.root.innerHTML = `<div class="text-center py-20 font-bold text-gray-400">Tur tidak ditemukan.</div>`;
                        }
                    } else if (route === '#booking' && param) {
                        const targetTour = AppState.tours.find(t => t.id === param || t.slug === param);
                        if (targetTour) {
                            this.root.innerHTML = Components.BookingForm(targetTour);
                        } else {
                            this.root.innerHTML = `<div class="text-center py-20 font-bold text-gray-400">Tur tidak ditemukan.</div>`;
                        }
                    } else if (route === '#gallery') {
                        this.root.innerHTML = Components.Gallery();
                    } else if (route === '#faq') {
                        this.root.innerHTML = Components.FAQ();
                    } else if (route === '#admin') {
                        if (AppState.isAdminAuthenticated) {
                            this.root.innerHTML = Components.AdminDashboard();
                            await window.renderAdminTab('site');
                        } else {
                            this.root.innerHTML = Components.AdminLogin();
                        }
                    } else {
                        this.root.innerHTML = Components.Home();
                    }

                    // Pemicu Mesin Penerjemah Bahasa Otomatis
                    await runAutoMachineTranslation(AppState.currentLanguage);

                    this.root.style.opacity = '1';
                    this.hideLoader();
                    window.scrollTo({ top: 0, behavior: 'instant' });
                }, 150);
            },

            showLoader() {
                this.loader.style.transform = 'translateX(0)';
            },
            hideLoader() {
                this.loader.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    this.loader.style.transform = 'translateX(-100%)';
                }, 500);
            },
            handleScroll() {
                const header = document.getElementById('header-container');
                if (window.scrollY > 50) {
                    header.classList.add('py-1', 'bg-white/95', 'shadow-md');
                } else {
                    header.classList.remove('py-1', 'bg-white/95', 'shadow-md');
                }
            },
            toggleMobileMenu() {
                const menu = document.getElementById('mobile-menu');
                menu.classList.toggle('hidden');
            }
        };

        /* ==========================================================================
           5. INTERACTIVE NOTIFICATION (TOAST) & DIALOG (MODAL) PORTAL
           ========================================================================== */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Konfigurasi visual berdasarkan status toast
            let colors = 'bg-emerald-500 text-white';
            let icon = 'ph-fill ph-check-circle';
            if (type === 'error') {
                colors = 'bg-rose-500 text-white';
                icon = 'ph-fill ph-x-circle';
            } else if (type === 'info') {
                colors = 'bg-accent text-white';
                icon = 'ph-fill ph-info';
            }

            toast.className = `flex items-center gap-3 px-5 py-4 rounded-2xl shadow-2xl ${colors} transition-all duration-500 transform translate-y-4 opacity-0 text-sm font-semibold mb-2`;
            toast.innerHTML = `<i class="${icon} text-xl"></i> <span>${message}</span>`;
            container.appendChild(toast);

            // Trigger transisi penayangan yang anggun
            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-4');
            }, 50);

            // Hapus otomatis dengan efek memudar setelah 3 detik
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => {
                    toast.remove();
                }, 500);
            }, 3000);
        }

        /* Custom Modern Confirm Dialog Box mapping a Javascript Promise */
        window.showConfirm = (title, message) => {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                const btnOk = document.getElementById('confirm-ok');
                const btnCancel = document.getElementById('confirm-cancel');
                const titleEl = document.getElementById('confirm-title');
                const msgEl = document.getElementById('confirm-message');

                titleEl.textContent = title;
                msgEl.textContent = message;

                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.firstElementChild.classList.remove('scale-95');

                const cleanUp = (result) => {
                    modal.classList.add('opacity-0', 'pointer-events-none');
                    modal.firstElementChild.classList.add('scale-95');
                    btnOk.replaceWith(btnOk.cloneNode(true));
                    btnCancel.replaceWith(btnCancel.cloneNode(true));
                    resolve(result);
                };

                document.getElementById('confirm-ok').addEventListener('click', () => cleanUp(true));
                document.getElementById('confirm-cancel').addEventListener('click', () => cleanUp(false));
            });
        };
    </script>

    <script>
        /* ==========================================================================
           8. SECURE CMS DASHBOARD INTERACTION CONTROLLER (ENTERPRISE STANDARD)
           ========================================================================== */
        const BRUTE_LOCK_KEY = 'ST_BRUTE_LOCK';
        const BRUTE_ATTEMPTS_KEY = 'ST_BRUTE_ATTEMPTS';

        window.handleAdminLogin = async (event) => {
            event.preventDefault();
            const usernameInput = document.getElementById('a-user').value;
            const passwordInput = document.getElementById('a-pass').value;

            // Memeriksa Proteksi Serangan Kamus / Brute Force Rate Limiting
            const lockTimestamp = localStorage.getItem(BRUTE_LOCK_KEY);
            if (lockTimestamp && Date.now() < parseInt(lockTimestamp)) {
                const remaining = Math.ceil((parseInt(lockTimestamp) - Date.now()) / 1000);
                showToast(`Login dibekukan! Silakan tunggu ${remaining} detik lagi.`, 'error');
                return;
            }

            let attempts = parseInt(localStorage.getItem(BRUTE_ATTEMPTS_KEY) || '0');

            // Enkripsi Sandi input tamu menggunakan standar SHA-256
            const inputHash = await sha256(passwordInput);

            // Periksa kecocokan kredensial
            if (usernameInput === AppState.adminUsername && inputHash === AppState.adminPassword) {
                // Berhasil Masuk Portal Admin
                AppState.isAdminAuthenticated = true;
                localStorage.setItem(BRUTE_ATTEMPTS_KEY, '0');

                // Buat token otorisasi sesi terenkripsi unik
                const sessionToken = await sha256(AppState.adminUsername + AppState.adminPassword);
                sessionStorage.setItem('ST_ADMIN_AUTH', 'true');
                sessionStorage.setItem('ST_ADMIN_TOKEN', sessionToken);

                showToast("Login berhasil! Selamat datang Administrator Sibling Tours.", 'success');
                
                // Mengalihkan rute hash secara asinkron
                window.location.hash = '#admin';
                App.handleRoute(); // Panggil manual jika hash lama sama
            } else {
                // Hitung kegagalan masuk
                attempts += 1;
                localStorage.setItem(BRUTE_ATTEMPTS_KEY, attempts.toString());
                
                if (attempts >= 5) {
                    const lockTime = Date.now() + 60000; // Bekukan 60 Detik
                    localStorage.setItem(BRUTE_LOCK_KEY, lockTime.toString());
                    showToast("Terlalu banyak kegagalan masuk! Portal login dikunci selama 60 detik.", 'error');
                } else {
                    showToast(`Sandi atau Username salah! Percobaan tersisa: ${5 - attempts}`, 'error');
                }
            }
        };

        window.handleAdminLogout = () => {
            AppState.isAdminAuthenticated = false;
            sessionStorage.removeItem('ST_ADMIN_AUTH');
            sessionStorage.removeItem('ST_ADMIN_TOKEN');
            showToast("Sesi ditutup! Anda berhasil keluar secara aman.", 'info');

            event.preventDefault();

            const phone = document.getElementById('b-phone').value;
            const country = document.getElementById('b-country').value;

            const price = document.getElementById('b-price').value;
            const date = document.getElementById('b-date').value;

            const bookingId = crypto.randomUUID().slice(0, 8);
            const newBooking = {
                id: bookingId,
                name, email, phone, country, tour, price, date, guests, notes,
                status: 'Pending',
                created_at: new Date().toISOString()
            };

            showToast('Menyimpan pesanan ke database...', 'info');

            try {
                const useSupabase = (supabaseClient !== null);
                if (useSupabase) {
                    const { error } = await supabaseClient.from('bookings').insert([{
                        id: newBooking.id,
                        name: newBooking.name,
                        email: newBooking.email,
                        phone: newBooking.phone,
                        country: newBooking.country,
                        tour: newBooking.tour,
                        date: newBooking.date,
                        guests: parseInt(newBooking.guests),
                        notes: newBooking.notes,
                        status: newBooking.status

                setTimeout(() => {

                    const cleanNumber = window.getCleanWhatsAppNumber(AppState.site.whatsapp);
                    const waUrl = `https://wa.me/${cleanNumber}?text=${message}`;

        window.saveSiteSettings = async (event) => {
            event.preventDefault();
            
            const siteUpdates = {
                logo: document.getElementById('s-logo').value,
                tagline: document.getElementById('s-tagline').value,
                email: document.getElementById('s-email').value,
                whatsapp: document.getElementById('s-whatsapp').value,
                phone: document.getElementById('s-phone').value,
                address: document.getElementById('s-address').value,
                aboutSnippet: document.getElementById('s-about').value,
                socials: {
                    instagram: document.getElementById('s-instagram').value || '',
                    facebook: AppState.site?.socials?.facebook || 'https://facebook.com',
                    youtube: AppState.site?.socials?.youtube || 'https://youtube.com'
                }
            };

            showToast('Menyimpan pengaturan...', 'info');

            try {
                const useSupabase = (supabaseClient !== null);
                if (useSupabase) {
                    // Ambil data untuk mengecek apakah baris id=1 sudah ada secara akurat
                    const { data: existingRow, error: checkError } = await supabaseClient
                        .from('site_settings')
                        .select('id')
                        .eq('id', 1)
                        .maybeSingle();

                    if (checkError) throw checkError;

                    if (!existingRow) {
                        // Jika baris id=1 belum pernah terbuat, lakukan upsert lengkap dengan kredensial aman
                        const { error: upsertError } = await supabaseClient
                            .from('site_settings')
                            .upsert({
                                id: 1,
                                logo: siteUpdates.logo,
                                tagline: siteUpdates.tagline,
                                email: siteUpdates.email,
                                whatsapp: siteUpdates.whatsapp,
                                phone: siteUpdates.phone,
                                address: siteUpdates.address,
                                about_snippet: siteUpdates.aboutSnippet,
                                instagram: siteUpdates.socials.instagram,
                                admin_username: AppState.adminUsername || 'admin',
                                admin_password: AppState.adminPassword || DEFAULT_PASS_HASH
                            });
                        if (upsertError) throw upsertError;
                    } else {
                        // Lakukan update secara presisi jika baris id=1 sudah ada
                        const { error: updateError } = await supabaseClient
                            .from('site_settings')
                            .update({
                                logo: siteUpdates.logo,
                                tagline: siteUpdates.tagline,
                                email: siteUpdates.email,
                                whatsapp: siteUpdates.whatsapp,
                                phone: siteUpdates.phone,
                                address: siteUpdates.address,
                                about_snippet: siteUpdates.aboutSnippet,
                                instagram: siteUpdates.socials.instagram
                            })
                            .eq('id', 1);
                        if (updateError) throw updateError;
                    }
                } else {
                    AppState.site = siteUpdates;
                    await AppState.save();
                }

                // Selalu perbarui memory state agar sinkron seketika
                AppState.site = siteUpdates;

                // Re-render Header & Footer secara real-time di layar browser
                document.getElementById('header-container').innerHTML = Components.Header();
                document.getElementById('footer-container').innerHTML = Components.Footer();

                // Perbarui link tombol floating WhatsApp secara real-time
                const cleanNumber = window.getCleanWhatsAppNumber(siteUpdates.whatsapp);
                const floatingWa = document.getElementById('floating-wa');
                if (floatingWa) {
                    floatingWa.href = `https://wa.me/${cleanNumber}?text=Halo Sibling Tours, saya ingin menanyakan tentang paket tour premium ke Labuan Bajo.`;
                }

                showToast('Pengaturan website berhasil disimpan!', 'success');
                await window.renderAdminTab('site');

                console.error(err);
                showToast('Gagal memperbarui pengaturan website.', 'error');
            }

        /* Perbarui Keamanan Administrator (Secure SHA-256 Enforced) */
        window.saveAdminSecurity = async (event) => {
            event.preventDefault();
            const newUsername = document.getElementById('sec-user').value;
            const oldPassword = document.getElementById('sec-old-pass').value;
            const newPassword = document.getElementById('sec-new-pass').value;
            const confirmPassword = document.getElementById('sec-new-pass-confirm').value;

            // Enkripsi password lama untuk memverifikasi kecocokan data
            const oldPassHashInput = await sha256(oldPassword);

            if (oldPassHashInput !== AppState.adminPassword) {
                showToast('Sandi Rahasia saat ini tidak valid!', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('Sandi Baru dan konfirmasi sandi baru tidak sama!', 'error');
                return;
            }

            const confirm = await showConfirm('Perbarui Kredensial', 'Kredensial login Anda akan diubah. Sistem akan mengeluarkan Anda secara otomatis untuk proses penyegaran sesi. Lanjutkan?');
            if (!confirm) return;

            const newPassHash = await sha256(newPassword);

            try {
                const useSupabase = (supabaseClient !== null);
                if (useSupabase) {
                    const { error } = await supabaseClient
                        .from('site_settings')
                        .update({
                            admin_username: newUsername,
                            admin_password: newPassHash
                        })
                        .eq('id', 1);
                    if (error) throw error;
                } else {
                    AppState.adminUsername = newUsername;
                    AppState.adminPassword = newPassHash;
                    await AppState.save();
                }

                // Perbarui data lokal
                AppState.adminUsername = newUsername;
                AppState.adminPassword = newPassHash;

                showToast('Keamanan Admin berhasil diperbarui! Mengalihkan...', 'success');
                setTimeout(() => {
                    window.handleAdminLogout();
                }, 1500);
            } catch (err) {
                console.error(err);
                showToast('Gagal memperbarui sistem keamanan.', 'error');
            }
        };

                    if (error) throw error;
                } else {
                    AppState.gallery = AppState.gallery.filter(g => g.id !== id);
                    await AppState.save();
                }

                showToast('Foto berhasil terhapus dari Galeri.', 'success');
                await AppState.init();
                await window.renderAdminTab('gallery');
            } catch (err) {
                console.error(err);
                showToast('Gagal menghapus foto.', 'error');
            }
        };

        /* Kelola Paket Wisata (Add / Edit / Delete) */
        window.openTourForm = (tourId = null) => {
            const editMode = tourId !== null;
            const tour = editMode ? AppState.tours.find(t => t.id === tourId) : null;

            const wrapper = document.createElement('div');
            wrapper.id = 'tour-form-modal';
            wrapper.className = 'fixed inset-0 bg-dark/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto';
            wrapper.innerHTML = `
                <div class="bg-white rounded-3xl p-6 max-w-2xl w-full shadow-2xl my-8">
                    <h3 class="text-lg font-bold text-primary mb-4">${editMode ? 'Edit Paket Wisata' : 'Tambahkan Paket Wisata Baru'}</h3>
                    <form onsubmit="window.saveTour(event, ${editMode ? `'${tourId}'` : 'null'})" class="space-y-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Judul Paket</label>
                            <input type="text" id="t-title" required value="${editMode ? tour.title : ''}" class="w-full px-4 py-2 border rounded-xl text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Harga (Rupiah/Pax)</label>
                            <input type="text" id="t-price" required value="${editMode ? tour.price : 'Rp '}" class="w-full px-4 py-2 border rounded-xl text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Durasi</label>
                            <input type="text" id="t-duration" required placeholder="Contoh: 3 Hari / 2 Malam" value="${editMode ? tour.duration : ''}" class="w-full px-4 py-2 border rounded-xl text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Kategori Armada</label>
                            <input type="text" id="t-category" required placeholder="Liveaboard / Daily Trip" value="${editMode ? tour.category : ''}" class="w-full px-4 py-2 border rounded-xl text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Lokasi Kumpul</label>
                            <input type="text" id="t-location" required value="${editMode ? tour.location : 'Labuan Bajo'}" class="w-full px-4 py-2 border rounded-xl text-sm font-semibold">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">URL Gambar Thumbnail</label>
                            <input type="url" id="t-thumbnail" required value="${editMode ? tour.thumbnail : ''}" class="w-full px-4 py-2 border rounded-xl text-sm font-semibold">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Deskripsi Singkat</label>
                            <textarea id="t-description" rows="3" required class="w-full px-4 py-2 border rounded-xl text-sm font-semibold leading-relaxed">${editMode ? tour.description : ''}</textarea>
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Destinasi Unggulan (pisahkan dengan koma)</label>
                            <input type="text" id="t-highlights" required placeholder="Pulau Padar, Pink Beach, ..." value="${editMode ? tour.highlights : ''}" class="w-full px-4 py-2 border rounded-xl text-sm font-semibold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Fasilitas Termasuk (pisahkan dengan koma)</label>
                            <textarea id="t-included" rows="3" required class="w-full px-4 py-2 border rounded-xl text-xs font-medium">${editMode ? tour.included : ''}</textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Belum Termasuk (pisahkan dengan koma)</label>
                            <textarea id="t-excluded" rows="3" required class="w-full px-4 py-2 border rounded-xl text-xs font-medium">${editMode ? tour.excluded : ''}</textarea>
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Itinerary Itinerari Detail (pisahkan baris per hari)</label>
                            <textarea id="t-itinerary" rows="4" required class="w-full px-4 py-2 border rounded-xl text-xs font-semibold leading-relaxed">${editMode ? tour.itinerary : ''}</textarea>
                        </div>
                        <div class="sm:col-span-2 flex items-center justify-end gap-3 mt-4 border-t pt-4">
                            <button type="button" onclick="document.getElementById('tour-form-modal').remove()" class="px-5 py-2.5 border border-gray-300 text-gray-600 rounded-xl text-xs font-bold hover:bg-gray-50">Batal</button>
                            <button type="submit" class="px-5 py-2.5 bg-primary text-white rounded-xl text-xs font-bold hover:bg-secondary">Simpan Paket</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(wrapper);
        };

        window.saveTour = async (event, tourId = null) => {
            event.preventDefault();
            const editMode = tourId !== null;

            const title = document.getElementById('t-title').value;
            const price = document.getElementById('t-price').value;
            const duration = document.getElementById('t-duration').value;
            const category = document.getElementById('t-category').value;
            const location = document.getElementById('t-location').value;
            const thumbnail = document.getElementById('t-thumbnail').value;
            const description = document.getElementById('t-description').value;
            const highlights = document.getElementById('t-highlights').value;
            const included = document.getElementById('t-included').value;
            const excluded = document.getElementById('t-excluded').value;
            const itinerary = document.getElementById('t-itinerary').value;

            const id = editMode ? tourId : crypto.randomUUID().slice(0, 8);
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

            const tourPayload = {
                id, slug, title, price, duration, category, location, thumbnail, description, highlights, included, excluded, itinerary,
                rating: 5.0, reviews: 1, availability: true
            };

            showToast('Menyimpan paket wisata...', 'info');

            try {
                const useSupabase = (supabaseClient !== null);
                if (useSupabase) {
                    const { error } = await supabaseClient.from('tours').upsert([tourPayload]);
                    if (error) throw error;
                } else {
                    if (editMode) {
                        const idx = AppState.tours.findIndex(t => t.id === tourId);
                        if (idx !== -1) AppState.tours[idx] = tourPayload;
                    } else {
                        AppState.tours.push(tourPayload);
                    }
                    await AppState.save();
                }

                showToast('Paket wisata berhasil disimpan!', 'success');
                document.getElementById('tour-form-modal').remove();
                await AppState.init();
                await window.renderAdminTab('tours');
            } catch (err) {
                console.error(err);
                showToast('Gagal menyimpan paket wisata.', 'error');
            }
        };

        window.editTour = (id) => {
            window.openTourForm(id);
        };

        window.deleteTour = async (id) => {
            const confirm = await showConfirm('Hapus Paket Wisata', 'Apakah Anda yakin ingin menghapus paket wisata terpilih?');
            if (!confirm) return;

            try {
                const useSupabase = (supabaseClient !== null);
                if (useSupabase) {
                    const { error } = await supabaseClient.from('tours').delete().eq('id', id);
                    if (error) throw error;
                } else {
                    AppState.tours = AppState.tours.filter(t => t.id !== id);
                    await AppState.save();
                }

                showToast('Paket wisata berhasil dihapus.', 'success');
                await AppState.init();
                await window.renderAdminTab('tours');
            } catch (err) {
                console.error(err);
                showToast('Gagal menghapus paket wisata.', 'error');
            }
        };
    </script>

    <script>
        /* ==========================================================================
           9. INITIAL BOOTSTRAP TRIGGER
           ========================================================================== */
        window.onload = function () {
            App.init();
        }
    </script>
</body>
</html>
