<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sibling Tours | Premium Labuan Bajo Experiences & Cloud CMS</title>
    <meta name="description" content="Discover the beauty of Labuan Bajo and Komodo National Park with Sibling Tours. Premium, luxury tropical travel experiences.">
    <meta name="keywords" content="Labuan Bajo, Komodo, Tours, Travel, Indonesia, Premium Travel, Sibling Tours">
    <meta name="author" content="Sibling Tours">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://siblingtours.com/">
    <meta property="og:title" content="Sibling Tours | Premium Labuan Bajo Experiences">
    <meta property="og:description" content="Discover the beauty of Labuan Bajo and Komodo National Park with Sibling Tours.">
    
    <!-- Fonts: Poppins & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Supabase JS Client Library CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A4D68',
                        secondary: '#088395',
                        accent: '#FFD166',
                        light: '#F8FAFC',
                        dark: '#0F172A'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'zoom-in': 'zoomIn 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        zoomIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary: #0A4D68;
            --secondary: #088395;
            --accent: #FFD166;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F8FAFC;
            color: #334155;
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Animation utilities */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--primary);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Header Scroll Effect */
        .header-scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header-scrolled .nav-link { color: var(--primary); }
        .header-transparent { background: transparent; }
        .header-transparent .nav-link { color: white; }

        /* Gallery Masonry */
        .gallery-masonry {
            column-count: 1;
            column-gap: 1rem;
        }
        @media (min-width: 640px) { .gallery-masonry { column-count: 2; } }
        @media (min-width: 1024px) { .gallery-masonry { column-count: 3; } }
        .gallery-item { break-inside: avoid; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <!-- Loader Screen -->
    <div id="loader"><div class="spinner"></div></div>

    <!-- Custom Toast Notification Box -->
    <div id="toast-container" class="fixed top-24 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Custom Confirmation Modal (Replacing window.confirm) -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl animate-zoom-in text-center border border-gray-100">
            <div class="w-16 h-16 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4 text-3xl">
                <i class="ph ph-warning"></i>
            </div>
            <h3 id="confirm-title" class="text-xl font-bold text-dark mb-2">Konfirmasi Tindakan</h3>
            <p id="confirm-message" class="text-sm text-gray-500 mb-6 leading-relaxed">Apakah Anda yakin ingin melanjutkan tindakan ini?</p>
            <div class="flex gap-3 justify-center">
                <button id="confirm-btn-cancel" class="bg-gray-100 hover:bg-gray-200 text-dark px-5 py-3 rounded-xl text-xs font-bold transition w-full">Batal</button>
                <button id="confirm-btn-ok" class="bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-xl text-xs font-bold transition w-full">Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- Layout Wrapper -->
    <header id="header-container" class="fixed w-full top-0 z-50 transition-all duration-300 header-transparent"></header>
    
    <main id="app-root" class="min-h-screen"></main>
    
    <footer id="footer-container" class="bg-dark text-white pt-16 pb-8"></footer>

    <!-- WhatsApp Floating Action Button -->
    <a href="#" id="floating-wa" target="_blank" class="fixed bottom-6 right-6 bg-[#25D366] text-white p-4 rounded-full shadow-lg hover:scale-110 transition-transform z-40 flex items-center justify-center">
        <i class="ph-fill ph-whatsapp-logo text-3xl"></i>
    </a>

    <script>
        // Data Default (Sebelum diedit melalui dashboard CMS atau ditarik dari database cloud)
        const DEFAULT_SITE = {
            name: "Sibling Tours",

            logo: "Sibling Tours",
            email: "hello@siblingtours.com",

            subtitle: "Petualangan tropis premium yang dirancang khusus untuk kenyamanan jiwa Anda.",
            image: "https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?auto=format&fit=crop&q=80&w=2070",
            ctaText: "Jelajahi Paket Wisata",
            ctaLink: "#tours"
        };

        const DEFAULT_TOURS = [
            {
                id: "t1",
                slug: "premium-komodo-3d2n",
                title: "Premium Komodo 3D2N Luxury Phinisi",
                price: "Rp 6.500.000",
                duration: "3 Hari / 2 Malam",
                category: "Liveaboard",
                rating: 4.9,
                reviews: 128,
                location: "Taman Nasional Komodo",
                thumbnail: "https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?auto=format&fit=crop&q=80&w=800",
                description: "Rasakan kemewahan tiada tanding di atas kapal Phinisi tradisional berstandar internasional. Berlayar melintasi gugusan pulau tropis memukau, trekking melihat naga purba Komodo, dan menyelam di air laut sejernih kristal.",
                highlights: "Padar Island Sunrise, Komodo Dragon Trekking, Pink Beach Snorkeling, Manta Point Swimming, Sunset Kalong Island",
                included: "Makan 3x Sehari (B,L,D), Alat Snorkeling Premium, Tour Guide Profesional, Cabin Kapal Full AC, Dokumentasi Drone",
                excluded: "Tiket Masuk Taman Nasional Komodo, Penerbangan PP, Belanja Pribadi, Tip Crew Kapal",
                itinerary: "Hari 1: Penjemputan - Pulau Kelor (Snorkeling) - Pulau Rinca (Trekking Komodo) - Pulau Kalong (Matahari terbenam & jutaan kelelawar) | Hari 2: Pulau Padar (Sunrise hiking) - Pink Beach (Relax & Swim) - Manta Point (Snorkeling with Mantas) | Hari 3: Pulau Kanawa (Snorkeling) - Kembali ke Labuan Bajo - Drop Bandara",
                availability: true
            },
            {
                id: "t2",
                slug: "one-day-speedboat",
                title: "One Day Speedboat Adventure (6 Destinasi)",
                price: "Rp 1.450.000",
                duration: "1 Hari",
                category: "Speedboat",
                rating: 4.8,

                location: "Taman Nasional Komodo",
                thumbnail: "https://images.unsplash.com/photo-1621991468822-77eb60c5c64c?auto=format&fit=crop&q=80&w=800",
                description: "Waktu Anda terbatas? Kunjungi 6 destinasi ikonik terpopuler di Kepulauan Komodo dalam satu hari penuh menggunakan Speedboat modern kami yang cepat dan sangat nyaman.",

                included: "Lunch Box Premium, Air Mineral Dingin, Alat Snorkeling, Tiket Masuk Rinca, Jaket Keselamatan, Pemandu Wisata",
                excluded: "Tiket Penerbangan, Pengeluaran Pribadi, Tip Guide",
                itinerary: "Pagi hari berkumpul di Dermaga KP3. Menuju Pulau Padar untuk trekking melihat pemandangan 3 teluk. Dilanjutkan ke Pulau Komodo melihat reptil raksasa. Makan siang di Pink Beach dan berfoto. Snorkeling di Manta Point & berenang di pasir timbul Taka Makassar. Terakhir snorkeling santai di Pulau Kanawa sebelum kembali ke Labuan Bajo.",
                availability: true
            },
            {
                id: "t3",
                slug: "private-island-retreat",
                title: "Private Island Resort Luxury Escape",
                price: "Rp 12.000.000",
                duration: "4 Hari / 3 Malam",
                category: "Resort",
                rating: 5.0,
                reviews: 42,
                location: "Seraya Island Resort",
                thumbnail: "https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?auto=format&fit=crop&q=80&w=800",
                description: "Melarikan diri ke pulau resort mewah terpencil. Bangun dengan pemandangan lautan turquoise di depan pintu villa Anda, nikmati makan malam romantis di tepi pantai, dan segarkan jiwa Anda.",
                highlights: "Private Beachfront Beach Villa, Pasangan Spa Treatment, Romantic Candlelight Beach Dinner, Private Sunset Cruise",
                included: "Akomodasi Luxury Villa, Makan Pagi-Siang-Malam Kustom, Transportasi Speedboat PP, 1x Pasangan Spa, Akses Private Beach",
                excluded: "Tiket Penerbangan, Pengeluaran Bar Alkohol, Tour Tambahan",
                itinerary: "Hari 1: Penjemputan di Bandara Labuan Bajo, Transfer kapal ke Pulau Seraya, Welcome Drink, Santai Sore. | Hari 2: Spa Treatment Pasangan di pagi hari, Snorkeling di terumbu karang private resort, Sunset Dinner romantis di pantai. | Hari 3: Berlayar sore menikmati sunset dengan kapal private, makan malam mewah chef kustom. | Hari 4: Sarapan pagi, checkout resort, transfer kembali ke Bandara Labuan Bajo.",
                availability: true
            }
        ];

        const DEFAULT_GALLERY = [
            { category: "nature", url: "https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?auto=format&fit=crop&w=600" },
            { category: "boats", url: "https://images.unsplash.com/photo-1534008897995-27a23e859048?auto=format&fit=crop&w=600" },
            { category: "wildlife", url: "https://images.unsplash.com/photo-1600216668388-344cb89d9774?auto=format&fit=crop&w=600" },
            { category: "nature", url: "https://images.unsplash.com/photo-1621991468822-77eb60c5c64c?auto=format&fit=crop&w=600" }
        ];

        const DEFAULT_TESTIMONIALS = [
            { name: "Andi Wijaya", country: "Jakarta, Indonesia", text: "Pengalaman luar biasa! Kapal Phinisi Sibling Tours bersih, mewah, dan masakan chef kapalnya sangat enak setara restoran bintang lima.", rating: 5 },
            { name: "Sarah Jenkins", country: "Melbourne, Australia", text: "The speedboat tour was brilliantly organized. Friendly local guides who knew exactly where to find the manta rays and safe trekking paths.", rating: 5 }
        ];

        const DEFAULT_FAQ = [
            { q: "Kapan waktu terbaik berkunjung ke Labuan Bajo?", a: "Musim kemarau antara April hingga Desember sangat ideal. Di bulan September-November biasanya laut sangat tenang dan cuaca sangat bersahabat untuk aktivitas menyelam." },
            { q: "Apakah tur ini aman untuk anak-anak dan lansia?", a: "Sangat aman. Namun untuk trekking seperti di Pulau Padar memerlukan pengawasan ekstra karena rutenya menanjak. Kami juga menyediakan opsi rute yang lebih bersahabat." },
            { q: "Bagaimana cara melakukan pembayaran?", a: "Kami menerima transfer bank resmi, kartu kredit, dan mata uang asing tunai saat kedatangan di kantor pusat Sibling Tours Labuan Bajo." }
        ];

        const DEFAULT_TEAM = [
            { name: "Capt. Wayan Kusuma", role: "Founder & Lead Expedition Guide", image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=300" },
            { name: "Dewi Lestari", role: "Customer Service & Booking Operations", image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=300" }
        ];

        // KREDENSIAL SUPABASE (Masukkan API Keys Proyek Anda di Sini)
        const SUPABASE_URL = ""; 
        const SUPABASE_KEY = ""; 

        // Menggunakan 'supabaseClient' untuk menghindari collision dengan global identifier library 'supabase'
        let supabaseClient = null;
        let useSupabase = false;

        // Inisialisasi Klien Supabase jika Kredensial Valid
        if (SUPABASE_URL && SUPABASE_KEY && !SUPABASE_URL.startsWith("ISI_DENGAN_")) {
            try {
                supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
                if (supabaseClient) {
                    useSupabase = true;
                    console.log("Database: Cloud Supabase berhasil tersambung.");
                }
            } catch (err) {
                console.warn("Koneksi Supabase gagal, menggunakan LocalStorage fallback:", err);
            }
        } else {
            console.log("Database: Supabase tidak diatur atau credentials kosong. Berjalan pada model LocalStorage offline.");
        }

        // Custom Promise-based Confirmation Dialog
        window.showConfirm = (title, message, isDanger = true) => {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                const titleEl = document.getElementById('confirm-title');
                const messageEl = document.getElementById('confirm-message');
                const cancelBtn = document.getElementById('confirm-btn-cancel');
                const okBtn = document.getElementById('confirm-btn-ok');
                const iconContainer = modal.querySelector('.w-16');

                titleEl.innerText = title;
                messageEl.innerText = message;

                if (isDanger) {
                    iconContainer.className = "w-16 h-16 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4 text-3xl";
                    okBtn.className = "bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-xl text-xs font-bold transition w-full";
                } else {
                    iconContainer.className = "w-16 h-16 rounded-full bg-primary/10 text-primary flex items-center justify-center mx-auto mb-4 text-3xl";
                    okBtn.className = "bg-primary hover:bg-primary/90 text-white px-5 py-3 rounded-xl text-xs font-bold transition w-full";
                }

                modal.classList.remove('hidden');

                const handleCancel = () => {
                    modal.classList.add('hidden');
                    cleanup();
                    resolve(false);
                };

                const handleOk = () => {
                    modal.classList.add('hidden');
                    cleanup();
                    resolve(true);
                };

                const cleanup = () => {
                    cancelBtn.removeEventListener('click', handleCancel);
                    okBtn.removeEventListener('click', handleOk);
                };

                cancelBtn.addEventListener('click', handleCancel);
                okBtn.addEventListener('click', handleOk);
            });
        };

        const AppState = {
            site: null,
            hero: null,
            tours: [],
            gallery: [],
            testimonials: [],
            faq: [],
            team: [],
            bookings: [],
            isAdminAuthenticated: false,
            adminUsername: 'admin',
            adminPassword: 'admin123',

            async init() {
                this.isAdminAuthenticated = sessionStorage.getItem('ST_ADMIN_AUTH') === 'true';
                this.adminUsername = localStorage.getItem('ST_ADMIN_USER') || 'admin';
                this.adminPassword = localStorage.getItem('ST_ADMIN_PASS') || 'admin123';

                if (useSupabase && supabaseClient) {
                    try {
                        // 1. Ambil Pengaturan Website
                        const { data: siteData, error: siteErr } = await supabaseClient.from('site_settings').select('*').eq('id', 1).maybeSingle();
                        if (siteData && !siteErr) {
                            this.site = {
                                name: siteData.logo || DEFAULT_SITE.name,
                                tagline: siteData.tagline || DEFAULT_SITE.tagline,
                                logo: siteData.logo || DEFAULT_SITE.logo,
                                email: siteData.email || DEFAULT_SITE.email,
                                phone: siteData.phone || DEFAULT_SITE.phone,
                                whatsapp: siteData.whatsapp || DEFAULT_SITE.whatsapp,
                                address: siteData.address || DEFAULT_SITE.address,
                                socials: {
                                    instagram: siteData.instagram || DEFAULT_SITE.socials.instagram,
                                    facebook: siteData.facebook || DEFAULT_SITE.socials.facebook,
                                    youtube: siteData.youtube || DEFAULT_SITE.socials.youtube
                                },
                                aboutSnippet: siteData.about_snippet || DEFAULT_SITE.aboutSnippet
                            };
                            
                            // Ambil kredensial admin jika kolom tersedia di Supabase
                            if (siteData.admin_username) this.adminUsername = siteData.admin_username;
                            if (siteData.admin_password) this.adminPassword = siteData.admin_password;

                        } else {
                            this.site = DEFAULT_SITE;
                        }

                        // 2. Ambil Paket Wisata (Tours)
                        const { data: toursData, error: toursErr } = await supabaseClient.from('tours').select('*').order('created_at', { ascending: true });
                        if (toursData && !toursErr) {
                            this.tours = toursData;
                        } else {
                            this.tours = DEFAULT_TOURS;
                        }

                        // 3. Ambil FAQs
                        const { data: faqData, error: faqErr } = await supabaseClient.from('faqs').select('*').order('id', { ascending: true });
                        if (faqData && !faqErr) {
                            this.faq = faqData;
                        } else {
                            this.faq = DEFAULT_FAQ;
                        }

                        // 4. Ambil Bookings (Orderan masuk)
                        const { data: bookingData, error: bookErr } = await supabaseClient.from('bookings').select('*').order('created_at', { descending: true });
                        if (bookingData && !bookErr) {
                            this.bookings = bookingData;
                        } else {
                            this.bookings = [];
                        }

                    } catch (error) {
                        console.error("Terjadi kegagalan penarikan data dari Supabase:", error);
                        this.loadLocalFallback();
                    }
                } else {
                    this.loadLocalFallback();
                }

                // Pengaturan Hero & Team Cadangan Tetap Statis/Lokal
                this.hero = JSON.parse(localStorage.getItem('ST_HERO')) || DEFAULT_HERO;
                this.gallery = JSON.parse(localStorage.getItem('ST_GALLERY')) || DEFAULT_GALLERY;
                this.testimonials = JSON.parse(localStorage.getItem('ST_TESTIMONIALS')) || DEFAULT_TESTIMONIALS;
                this.team = JSON.parse(localStorage.getItem('ST_TEAM')) || DEFAULT_TEAM;
            },

            loadLocalFallback() {
                this.site = JSON.parse(localStorage.getItem('ST_SITE')) || DEFAULT_SITE;
                this.tours = JSON.parse(localStorage.getItem('ST_TOURS')) || DEFAULT_TOURS;
                this.faq = JSON.parse(localStorage.getItem('ST_FAQ')) || DEFAULT_FAQ;
                this.bookings = JSON.parse(localStorage.getItem('ST_BOOKINGS')) || [];
                this.adminUsername = localStorage.getItem('ST_ADMIN_USER') || 'admin';
                this.adminPassword = localStorage.getItem('ST_ADMIN_PASS') || 'admin123';
            },

            async save() {
                // Fungsi ini hanya berjalan jika tidak menggunakan Supabase
                if (!useSupabase) {
                    localStorage.setItem('ST_SITE', JSON.stringify(this.site));
                    localStorage.setItem('ST_HERO', JSON.stringify(this.hero));
                    localStorage.setItem('ST_TOURS', JSON.stringify(this.tours));
                    localStorage.setItem('ST_GALLERY', JSON.stringify(this.gallery));
                    localStorage.setItem('ST_TESTIMONIALS', JSON.stringify(this.testimonials));
                    localStorage.setItem('ST_FAQ', JSON.stringify(this.faq));
                    localStorage.setItem('ST_TEAM', JSON.stringify(this.team));
                    localStorage.setItem('ST_BOOKINGS', JSON.stringify(this.bookings));
                    localStorage.setItem('ST_ADMIN_USER', this.adminUsername);
                    localStorage.setItem('ST_ADMIN_PASS', this.adminPassword);
                }
            },

            async resetToDefault() {
                const confirmed = await showConfirm(
                    'Reset Factory Database',
                    'Apakah Anda yakin ingin menyetel ulang database ke pengaturan awal? Seluruh data kustom Anda akan terhapus secara permanen.'
                );
                if (confirmed) {
                    if (useSupabase) {
                        showToast('Reset database di Supabase harus dilakukan via SQL Editor atau manual di dashboard Supabase Anda.', 'error');
                        return;
                    }
                    localStorage.clear();
                    await this.init();
                    showToast('Database berhasil disetel ulang ke default!', 'success');
                    window.location.reload();
                }
            }
        };

        const Components = {
            Header: () => {
                const isAdmin = AppState.isAdminAuthenticated;
                return `
                <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                    <a href="#home" class="text-2xl font-bold tracking-tighter nav-link flex items-center gap-2">
                        <i class="ph ph-compass text-accent text-3xl"></i>
                        ${AppState.site.logo}
                    </a>
                    <!-- Desktop Nav -->
                    <nav class="hidden md:flex gap-8 items-center font-medium">
                        <a href="#home" class="nav-link hover:text-accent transition-colors">Home</a>
                        <a href="#about" class="nav-link hover:text-accent transition-colors">Tentang Kami</a>
                        <a href="#tours" class="nav-link hover:text-accent transition-colors">Paket Wisata</a>
                        <a href="#gallery" class="nav-link hover:text-accent transition-colors">Galeri</a>
                        <a href="#contact" class="nav-link hover:text-accent transition-colors">Hubungi</a>
                        
                        ${isAdmin ? `
                            <a href="#admin" class="bg-secondary text-white px-5 py-2 rounded-full font-semibold hover:bg-primary transition shadow flex items-center gap-2">
                                <i class="ph ph-squares-four"></i> Dashboard CMS
                            </a>
                        ` : `
                            <a href="#admin" class="text-xs opacity-75 hover:opacity-100 flex items-center gap-1"><i class="ph ph-lock-key"></i> Admin Login</a>
                        `}
                        
                        <a href="#tours" class="bg-accent text-primary px-6 py-2 rounded-full font-semibold hover:bg-white transition-all shadow-md">Pesan Sekarang</a>

                        <h1 class="text-5xl font-bold mb-4 text-primary">Galeri Petualangan</h1>

                    </div>
                </section>
                <section class="pb-24 bg-white">
                    <div class="container mx-auto px-6">
                        <div class="gallery-masonry reveal active">
                            ${AppState.gallery.map(img => `
                                <div class="gallery-item group relative overflow-hidden rounded-xl bg-gray-100">
                                    <img src="${img.url}" alt="Foto Komodo Sibling Tours" onerror="this.src='https://placehold.co/600x400/0A4D68/FFF?text=Gallery+Photo'" class="w-full h-auto object-cover transform group-hover:scale-110 transition-transform duration-700" loading="lazy">
                                    <div class="absolute inset-0 bg-primary/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">

            About: () => `
                <section class="pt-32 pb-16 bg-primary text-white text-center">
                    <div class="container mx-auto px-6 animate-fade-in-up">
                        <h1 class="text-5xl font-bold mb-4">Tentang Sibling Tours</h1>
                        <p class="text-xl text-gray-300 max-w-2xl mx-auto font-light">Merangkai mimpi petualangan tropis tak terlupakan.</p>
                    </div>
                </section>
                <section class="py-20 bg-white">
                    <div class="container mx-auto px-6 max-w-4xl text-center reveal active">
                        <h2 class="text-3xl font-bold text-primary mb-6">Sejarah & Visi Kami</h2>
                        <p class="text-lg text-gray-600 mb-6 leading-relaxed">Berawal dari kecintaan mendalam terhadap alam Nusa Tenggara Timur, khususnya Kepulauan Komodo, Sibling Tours didirikan dengan mimpi memperkenalkan keajaiban alam indonesia secara eksklusif. Kami merancang liburan kelas premium tanpa melupakan keramahan otentik khas Indonesia.</p>
                    </div>
                </section>
                <section class="py-20 bg-light">
                    <div class="container mx-auto px-6 text-center reveal active">
                        <h2 class="text-3xl font-bold text-primary mb-12">Pandu Ekspedisi Profesional Kami</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl mx-auto">
                            ${AppState.team.map(member => `
                                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-lg transition-shadow">
                                    <img src="${member.image}" alt="${member.name}" onerror="this.src='https://placehold.co/150x150/0A4D68/FFF?text=Avatar'" class="w-32 h-32 rounded-full object-cover mx-auto mb-4 border-4 border-light">
                                    <h3 class="text-xl font-bold text-dark">${member.name}</h3>
                                    <p class="text-secondary font-medium text-sm">${member.role}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `,

            Contact: () => `
                <section class="pt-32 pb-16 bg-white text-center">
                    <div class="container mx-auto px-6 animate-fade-in-up">
                        <h1 class="text-5xl font-bold mb-4 text-primary">Hubungi Kami</h1>
                        <p class="text-xl text-gray-600 max-w-2xl mx-auto font-light">Silakan kunjungi kantor kami atau hubungi via daring.</p>
                    </div>
                </section>
                <section class="pb-24 bg-white">
                    <div class="container mx-auto px-6 max-w-5xl">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 bg-light rounded-3xl overflow-hidden shadow-lg border border-gray-100 reveal active">
                            <div class="p-10 md:p-12">
                                <h2 class="text-3xl font-bold text-primary mb-8">Detail Kantor</h2>
                                <div class="space-y-6">
                                    <div class="flex items-start gap-4">
                                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-secondary text-2xl shadow-sm shrink-0"><i class="ph ph-map-pin"></i></div>
                                        <div>
                                            <h4 class="font-bold text-dark mb-1">Alamat Kantor Pusat</h4>
                                            <p class="text-gray-600 text-sm leading-relaxed">${AppState.site.address}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-start gap-4">
                                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-secondary text-2xl shadow-sm shrink-0"><i class="ph ph-phone"></i></div>
                                        <div>
                                            <h4 class="font-bold text-dark mb-1">Nomor Layanan HP</h4>
                                            <p class="text-gray-600 text-sm">${AppState.site.phone}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-start gap-4">
                                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-secondary text-2xl shadow-sm shrink-0"><i class="ph ph-envelope"></i></div>
                                        <div>
                                            <h4 class="font-bold text-dark mb-1">Email</h4>
                                            <p class="text-gray-600 text-sm">${AppState.site.email}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="h-[400px] md:h-auto bg-gray-200 relative">
                                <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=800');">
                                    <div class="absolute inset-0 bg-primary/20 backdrop-blur-[2px]"></div>
                                    <div class="absolute inset-0 flex items-center justify-center">
                                        <div class="bg-white p-6 rounded-2xl shadow-2xl text-center max-w-xs mx-4">
                                            <i class="ph-fill ph-map-pin text-4xl text-red-500 mb-2"></i>
                                            <p class="font-bold text-primary">Sibling Tours Labuan Bajo Office</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                
                <!-- FAQs Accordion Section -->
                <section class="py-24 bg-light" id="faq">
                    <div class="container mx-auto px-6 max-w-3xl reveal active">
                        <div class="text-center mb-12">
                            <span class="text-secondary font-bold tracking-widest uppercase text-sm mb-2 block">FAQ</span>
                            <h2 class="text-3xl md:text-4xl font-bold text-primary">Pertanyaan yang Sering Diajukan</h2>
                        </div>
                        <div class="space-y-4">
                            ${AppState.faq.map((item, i) => `
                                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden transition-all duration-300">
                                    <button class="w-full text-left px-6 py-5 font-bold text-dark flex justify-between items-center focus:outline-none" onclick="toggleFaq(${i})">
                                        <span class="pr-4">${item.q}</span>
                                        <i class="ph ph-caret-down transform transition-transform text-secondary text-xl shrink-0" id="faq-icon-${i}"></i>
                                    </button>
                                    <div class="px-6 pb-6 text-gray-500 text-sm leading-relaxed hidden" id="faq-content-${i}">
                                        ${item.a}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `,

            NotFound: () => `
                <section class="h-screen flex flex-col items-center justify-center bg-white text-center px-6">
                    <h1 class="text-9xl font-black text-gray-200 mb-4">404</h1>
                    <h2 class="text-3xl font-bold text-primary mb-6">Halaman Tidak Ditemukan</h2>
                    <p class="text-gray-500 mb-8 max-w-md">Tautan rusak atau sedang dalam perbaikan oleh tim IT.</p>
                    <a href="#home" class="bg-accent text-primary px-8 py-3 rounded-full font-bold hover:bg-yellow-400 transition-colors">Kembali ke Beranda</a>
                </section>
            `
        };

        const AdminView = {
            Login: () => `
                <section class="pt-32 pb-24 bg-primary text-white min-h-screen flex items-center justify-center">
                    <div class="bg-white text-dark p-8 md:p-12 rounded-3xl shadow-2xl max-w-md w-full mx-4 border border-gray-100 animate-zoom-in">
                        <div class="text-center mb-8">
                            <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center text-primary text-3xl mx-auto mb-4">
                                <i class="ph ph-lock-key"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-primary">Login Administrator</h2>
                            <p class="text-xs text-gray-400 mt-1">Gunakan kredensial admin Anda untuk mengakses database internal.</p>
                        </div>
                        <form onsubmit="handleAdminLogin(event)" class="space-y-6">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                                <input type="text" id="a-user" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                                <input type="password" id="a-pass" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition">
                            </div>
                            <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-secondary transition-colors shadow-lg">
                                Autentikasi Masuk
                            </button>
                        </form>
                    </div>
                </section>
            `,

            Dashboard: (activeTab = 'tours') => {
                if (!AppState.isAdminAuthenticated) return AdminView.Login();

                return `
                    <section class="pt-28 pb-24 bg-light min-h-screen">
                        <div class="container mx-auto px-4 md:px-6">
                            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-8 border-b pb-6">
                                <div>
                                    <h1 class="text-3xl font-extrabold text-primary flex items-center gap-2">
                                        <i class="ph ph-shield-check"></i> Sibling Tours CMS Engine
                                    </h1>
                                    <p class="text-sm text-gray-500">Ubah, tambah, atau hapus database konten secara real-time ke ${useSupabase ? 'Cloud Supabase' : 'LocalStorage'}.</p>
                                </div>
                                <div class="flex gap-3">
                                    <button onclick="handleAdminLogout()" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition">
                                        <i class="ph ph-sign-out"></i> Keluar Sistem
                                    </button>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                <!-- Sidebar Kontrol -->
                                <div class="lg:col-span-1 bg-white p-6 rounded-2xl border border-gray-200 shadow-sm space-y-2 h-fit">
                                    <button onclick="renderAdminTab('tours')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 transition ${activeTab === 'tours' ? 'bg-primary text-white' : 'text-gray-600 hover:bg-light'}">
                                        <i class="ph ph-package text-lg"></i> Kelola Paket Wisata
                                    </button>
                                    <button onclick="renderAdminTab('bookings')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 transition ${activeTab === 'bookings' ? 'bg-primary text-white' : 'text-gray-600 hover:bg-light'}">
                                        <i class="ph ph-notebook text-lg"></i> Booking Masuk (${AppState.bookings.length})
                                    </button>
                                    <button onclick="renderAdminTab('site')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 transition ${activeTab === 'site' ? 'bg-primary text-white' : 'text-gray-600 hover:bg-light'}">
                                        <i class="ph ph-gear text-lg"></i> Pengaturan Web
                                    </button>
                                    <button onclick="renderAdminTab('faq')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 transition ${activeTab === 'faq' ? 'bg-primary text-white' : 'text-gray-600 hover:bg-light'}">
                                        <i class="ph ph-question text-lg"></i> Kelola FAQ
                                    </button>
                                    <button onclick="renderAdminTab('security')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 transition ${activeTab === 'security' ? 'bg-primary text-white' : 'text-gray-600 hover:bg-light'}">
                                        <i class="ph ph-lock-key-open text-lg"></i> Keamanan Admin
                                    </button>
                                    <button onclick="renderAdminTab('export')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 transition ${activeTab === 'export' ? 'bg-primary text-white' : 'text-gray-600 hover:bg-light'}">
                                        <i class="ph ph-download-simple text-lg"></i> Ekspor Database (JSON)
                                    </button>
                                </div>

                                <!-- Konten Editor Utama -->
                                <div class="lg:col-span-3 bg-white p-6 md:p-8 rounded-2xl border border-gray-200 shadow-sm">
                                    ${AdminView.RenderTabContent(activeTab)}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
            },

            RenderTabContent(tab) {
                switch (tab) {
                    case 'tours': return AdminView.ToursTab();
                    case 'bookings': return AdminView.BookingsTab();
                    case 'site': return AdminView.SiteTab();
                    case 'faq': return AdminView.FaqTab();
                    case 'security': return AdminView.SecurityTab();
                    case 'export': return AdminView.ExportTab();
                }
            },

            ToursTab: () => `
                <div class="flex justify-between items-center border-b pb-4 mb-6">
                    <h3 class="text-xl font-bold text-primary">Daftar Paket Tour</h3>
                    <button onclick="openTourModal()" class="bg-secondary hover:bg-primary text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 transition">
                        <i class="ph ph-plus-bold"></i> Tambah Tour Baru
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-500">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                            <tr>
                                <th class="px-4 py-3">Thumbnail</th>
                                <th class="px-4 py-3">Judul Paket</th>
                                <th class="px-4 py-3">Kategori</th>
                                <th class="px-4 py-3">Harga</th>
                                <th class="px-4 py-3">Durasi</th>
                                <th class="px-4 py-3 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            ${AppState.tours.map(tour => `
                                <tr class="hover:bg-gray-50/50">
                                    <td class="px-4 py-3">
                                        <img src="${tour.thumbnail}" alt="" onerror="this.src='https://placehold.co/60x40/0A4D68/FFF?text=Img'" class="w-12 h-8 object-cover rounded-md">
                                    </td>
                                    <td class="px-4 py-3 font-bold text-dark">${tour.title}</td>
                                    <td class="px-4 py-3"><span class="bg-primary/10 text-primary text-xs px-2.5 py-1 rounded-full">${tour.category}</span></td>
                                    <td class="px-4 py-3 text-secondary font-bold">${tour.price}</td>
                                    <td class="px-4 py-3 text-xs">${tour.duration}</td>
                                    <td class="px-4 py-3 text-right space-x-1.5">
                                        <button onclick="openTourModal('${tour.id}')" class="text-secondary hover:text-primary font-bold text-xs"><i class="ph ph-pencil-simple text-lg"></i></button>
                                        <button onclick="deleteTour('${tour.id}')" class="text-red-500 hover:text-red-700 font-bold text-xs"><i class="ph ph-trash text-lg"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <!-- Form Modal Kustom Tambah/Edit Tour -->
                <div id="tour-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
                    <div class="bg-white rounded-3xl max-w-3xl w-full h-[85vh] flex flex-col shadow-2xl animate-zoom-in">
                        <div class="p-6 border-b flex justify-between items-center">
                            <h3 id="modal-title" class="text-lg font-bold text-primary">Input Data Paket Tour</h3>
                            <button onclick="closeTourModal()" class="text-gray-400 hover:text-dark text-2xl"><i class="ph ph-x"></i></button>
                        </div>
                        <div class="p-6 overflow-y-auto space-y-6 flex-grow">
                            <form id="tour-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <input type="hidden" id="m-tour-id">
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Judul Paket Tour *</label>
                                    <input type="text" id="m-title" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Slug URL Unik *</label>
                                    <input type="text" id="m-slug" placeholder="premium-komodo-3d2n" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Harga Tiket Paket *</label>
                                    <input type="text" id="m-price" placeholder="Rp 5.000.000" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Durasi *</label>
                                    <input type="text" id="m-duration" placeholder="3 Hari / 2 Malam" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary focus:border-secondary outline-none transition text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Kategori Perahu / Resor *</label>
                                    <select id="m-category" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary text-sm bg-white">
                                        <option value="Liveaboard">Liveaboard</option>
                                        <option value="Speedboat">Speedboat</option>
                                        <option value="Resort">Resort</option>
                                        <option value="Culture">Culture</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Lokasi Base *</label>
                                    <input type="text" id="m-location" value="Taman Nasional Komodo" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary text-sm">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">URL Gambar Utama *</label>
                                    <input type="url" id="m-thumbnail" placeholder="https://..." required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary text-sm">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Deskripsi Singkat *</label>
                                    <textarea id="m-description" rows="3" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary text-sm"></textarea>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Sorotan (Pisahkan dengan tanda koma) *</label>
                                    <input type="text" id="m-highlights" placeholder="Padar Island Sunrise, Pink Beach, Manta Point" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-1 focus:ring-secondary text-sm">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Termasuk (Included - pisahkan dengan tanda koma)</label>
                                    <input type="text" id="m-included" placeholder="Makan 3x sehari, Alat snorkeling, Guide" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 text-sm">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Belum Termasuk (Excluded - pisahkan dengan tanda koma)</label>
                                    <input type="text" id="m-excluded" placeholder="Tiket pesawat PP, Keperluan pribadi" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 text-sm">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Format Itinerary Perjalanan (Pemisah Hari pakai pipa | , pemisah Judul pakai titik dua : ) *</label>
                                    <textarea id="m-itinerary" rows="4" placeholder="Hari 1: Penjemputan di bandara dan berlayar ke Kelor | Hari 2: Menikmati sunrise di Padar" required class="w-full px-4 py-2.5 rounded-xl border border-gray-300 text-sm"></textarea>
                                </div>
                            </form>
                        </div>
                        <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-3xl">
                            <button onclick="closeTourModal()" class="bg-gray-200 text-dark px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-gray-300 transition">Batalkan</button>
                            <button onclick="saveTourData()" class="bg-primary text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-secondary transition">Simpan ke Database</button>
                        </div>
                    </div>
                </div>
            `,

            BookingsTab: () => `
                <div class="border-b pb-4 mb-6">
                    <h3 class="text-xl font-bold text-primary">Daftar Reservasi & Booking Tamu</h3>
                    <p class="text-xs text-gray-400 mt-1">Orderan ini tersimpan langsung secara otomatis di database cloud.</p>
                </div>

                <div class="overflow-x-auto">
                    ${AppState.bookings.length === 0 ? `
                        <div class="text-center py-12 text-gray-400">
                            <i class="ph ph-folder-simple-dashed text-5xl mb-3 block"></i>
                            <p class="font-medium text-sm">Belum ada booking masuk di database Anda.</p>
                        </div>
                    ` : `
                        <table class="w-full text-left text-xs text-gray-500">
                            <thead class="text-[10px] text-gray-700 uppercase bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3">ID Trip</th>
                                    <th class="px-4 py-3">Nama Tamu</th>
                                    <th class="px-4 py-3">WhatsApp / Email</th>
                                    <th class="px-4 py-3">Paket Tour</th>
                                    <th class="px-4 py-3">Tanggal Trip</th>
                                    <th class="px-4 py-3">Status</th>
                                    <th class="px-4 py-3 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${AppState.bookings.map(book => `

                        <p class="text-sm text-gray-600 leading-relaxed">Website ini dirancang secara modern. Seluruh perubahan input data di atas telah tersimpan secara instan di database Anda. Jika Anda ingin menyematkannya secara manual ke dalam file JSON server, cukup salin data di bawah ini.</p>
                        
                        <div class="relative">

        };

        const App = {
            root: document.getElementById('app-root'),
            header: document.getElementById('header-container'),
            footer: document.getElementById('footer-container'),
            loader: document.getElementById('loader'),

            async init() {
                // Inisialisasi State (Tarik data dari Supabase/LocalStorage)
                await AppState.init();

                this.header.innerHTML = Components.Header();
                this.footer.innerHTML = Components.Footer();
                
                // Hubungkan tombol Whatsapp melayang
                document.getElementById('floating-wa').href = `https://wa.me/${AppState.site.whatsapp}?text=Halo Sibling Tours, saya ingin menanyakan tentang paket tour premium ke Labuan Bajo.`;

                // Event Listeners
                window.addEventListener('hashchange', () => this.handleRoute());
                window.addEventListener('scroll', this.handleScroll);
                this.setupMobileMenu();

                this.handleRoute();

                // Tutup loader
                setTimeout(() => {
                    this.loader.style.opacity = '0';
                    setTimeout(() => this.loader.style.display = 'none', 500);
                }, 800);
            },

            handleRoute() {
                const hash = window.location.hash.slice(1) || 'home';
                const parts = hash.split('/');
                const route = parts[0];
                const param = parts[1];

                window.scrollTo({ top: 0, behavior: 'auto' });

                if (route === 'home') {
                    this.header.classList.add('header-transparent');
                    this.header.classList.remove('header-scrolled', 'bg-white', 'text-primary', 'shadow-md');
                } else {
                    this.header.classList.remove('header-transparent');
                    this.header.classList.add('bg-white', 'text-primary', 'shadow-md');
                }

                // Tutup menu seluler
                document.getElementById('mobile-menu').classList.add('translate-x-full');

                let html = '';
                switch (route) {
                    case 'home': html = Views.Home(); break;
                    case 'tours': html = Views.Tours(); break;
                    case 'tour': html = Views.TourDetails(param); break;
                    case 'booking': html = Views.Booking(param); break;
                    case 'gallery': html = Views.Gallery(); break;
                    case 'about': html = Views.About(); break;
                    case 'contact': html = Views.Contact(); break;
                    case 'admin': 
                        html = AppState.isAdminAuthenticated ? AdminView.Dashboard() : AdminView.Login(); 
                        break;
                    default: html = Views.NotFound(); break;
                }

                this.root.innerHTML = html;
                
                // Re-sync Header
                this.header.innerHTML = Components.Header();
                this.setupMobileMenu();
                
                setTimeout(() => this.initScrollAnimations(), 100);
            },

            handleScroll() {
                const header = document.getElementById('header-container');
                const isHome = window.location.hash === '' || window.location.hash === '#home';
                
                if (isHome) {
                    if (window.scrollY > 50) {
                        header.classList.add('header-scrolled');
                        header.classList.remove('header-transparent');
                    } else {
                        header.classList.remove('header-scrolled');
                        header.classList.add('header-transparent');
                    }
                }
            },

            setupMobileMenu() {
                const btn = document.getElementById('mobile-menu-btn');
                const closeBtn = document.getElementById('close-menu-btn');
                const menu = document.getElementById('mobile-menu');
                
                if (btn && closeBtn && menu) {
                    btn.addEventListener('click', () => menu.classList.remove('translate-x-full'));
                    closeBtn.addEventListener('click', () => menu.classList.add('translate-x-full'));
                }
            },

            initScrollAnimations() {
                const reveals = document.querySelectorAll('.reveal');
                if(!reveals.length) return;

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });

                reveals.forEach(el => observer.observe(el));
            }
        };

        // Custom Toast Notification Maker
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const bgClass = type === 'success' ? 'bg-emerald-500' : (type === 'info' ? 'bg-blue-500' : 'bg-red-500');
            const iconClass = type === 'success' ? 'ph-check-circle' : (type === 'info' ? 'ph-info' : 'ph-warning');
            
            const toast = document.createElement('div');
            toast.className = `${bgClass} text-white px-5 py-4 rounded-2xl shadow-xl flex items-center gap-3 animate-fade-in-up max-w-sm pointer-events-auto`;
            toast.innerHTML = `
                <i class="ph ${iconClass} text-2xl shrink-0"></i>
                <div class="text-sm font-semibold">${message}</div>
            `;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                toast.addEventListener('transitionend', () => toast.remove());
            }, 3000);
        }

        // Accordion FAQ Toggle
        window.toggleFaq = (index) => {
            const content = document.getElementById(`faq-content-${index}`);
            const icon = document.getElementById(`faq-icon-${index}`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        };

        // Submit Form Booking & Persist Data (Supabase & LocalStorage Fallback)
        window.handleBookingFormSubmit = async (event) => {
            event.preventDefault();
            
            const name = document.getElementById('b-name').value;
            const email = document.getElementById('b-email').value;
            const phone = document.getElementById('b-phone').value;
            const country = document.getElementById('b-country').value;
            const tour = document.getElementById('b-tour').value;
            const date = document.getElementById('b-date').value;
            const guests = document.getElementById('b-guests').value;
            const notes = document.getElementById('b-notes').value || 'Tidak ada';

            const bookingId = crypto.randomUUID().slice(0, 8);
            const newBooking = {
                id: bookingId,
                name, email, phone, country, tour, date, guests, notes,
                status: 'Pending'
            };

            showToast('Menyimpan pesanan ke database...', 'info');

            try {
                if (useSupabase && supabaseClient) {
                    const { error } = await supabaseClient.from('bookings').insert([{
                        id: newBooking.id,
                        name: newBooking.name,
                        email: newBooking.email,
                        phone: newBooking.phone,
                        country: newBooking.country,
                        tour: newBooking.tour,
                        date: newBooking.date,
                        guests: parseInt(newBooking.guests),
                        notes: newBooking.notes,
                        status: newBooking.status
                    }]);
                    if (error) throw error;
                } else {
                    AppState.bookings.push(newBooking);
                    await AppState.save();
                }

                showToast('Booking berhasil tersimpan secara aman!', 'success');

                setTimeout(() => {
                    const message = `*Konfirmasi Pemesanan Sibling Tours*%0A%0A*ID Pemesanan:* #${newBooking.id}%0A*Nama:* ${name}%0A*Email:* ${email}%0A*WhatsApp:* ${phone}%0A*Kebangsaan:* ${country}%0A*Paket:* ${tour}%0A*Tanggal Mulai:* ${date}%0A*Pax:* ${guests} Orang%0A*Catatan:* ${notes}`;
                    const waUrl = `https://wa.me/${AppState.site.whatsapp}?text=${message}`;
                    window.open(waUrl, '_blank');
                    window.location.hash = '#home';
                }, 1500);

            } catch (err) {
                console.error(err);
                showToast('Gagal mengirim data booking, periksa koneksi Anda.', 'error');
            }
        };

        // login Administrator
        window.handleAdminLogin = (event) => {
            event.preventDefault();
            const user = document.getElementById('a-user').value;
            const pass = document.getElementById('a-pass').value;

            if (user === AppState.adminUsername && pass === AppState.adminPassword) {
                AppState.isAdminAuthenticated = true;
                sessionStorage.setItem('ST_ADMIN_AUTH', 'true');
                showToast('Login berhasil! Selamat datang Admin.', 'success');
                window.location.hash = '#admin';
            } else {
                showToast('Kredensial salah! Silakan coba lagi.', 'error');
            }
        };

        window.handleAdminLogout = () => {
            AppState.isAdminAuthenticated = false;
            sessionStorage.removeItem('ST_ADMIN_AUTH');
            showToast('Anda berhasil keluar dari sistem CMS.', 'success');
            window.location.hash = '#home';
        };

        window.renderAdminTab = async (tab) => {
            await AppState.init(); // Refresh data dari cloud/lokal
            const container = document.getElementById('app-root');
            container.innerHTML = AdminView.Dashboard(tab);
        };

        // FAQ CRUD
        window.addFaqRow = () => {
            const rows = document.getElementById('faq-rows');
            const newDiv = document.createElement('div');
            newDiv.className = 'bg-gray-50 p-4 rounded-xl border border-gray-200 relative group';
            newDiv.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center hover:bg-red-600 transition shadow text-xs"><i class="ph ph-trash"></i></button>
                <div class="space-y-3">
                    <input type="text" placeholder="Pertanyaan (Question)" required class="w-full px-3 py-2 rounded-lg border border-gray-300 text-xs font-semibold">

                </div>

            rows.appendChild(newDiv);

        window.saveFaqData = async (event) => {
            event.preventDefault();
            const rows = document.querySelectorAll('#faq-rows > div');
            const newFaqs = [];
            
            rows.forEach((row, index) => {

        // Ganti Username & Password Admin secara Dinamis
        window.saveAdminSecurity = async (event) => {
            event.preventDefault();

            const oldPass = document.getElementById('sec-old-pass').value;
            const newUsername = document.getElementById('sec-username').value;
            const newPass = document.getElementById('sec-new-pass').value;
            const confirmPass = document.getElementById('sec-confirm-pass').value;

            if (oldPass !== AppState.adminPassword) {
                showToast('Password lama Anda tidak cocok!', 'error');
                return;
            }

            if (newPass.length < 6) {
                showToast('Password baru minimal harus 6 karakter!', 'error');
                return;
            }

            if (newPass !== confirmPass) {
                showToast('Konfirmasi password baru tidak cocok!', 'error');
                return;
            }

            const confirmed = await showConfirm(
                'Perbarui Kredensial',
                'Apakah Anda yakin ingin mengganti Username dan Password login dasbor admin Anda?'
            );

            if (confirmed) {
                showToast('Memproses pembaruan keamanan...', 'info');

                AppState.adminUsername = newUsername;
                AppState.adminPassword = newPass;

                try {
                    if (useSupabase && supabaseClient) {

                            tagline: AppState.site.tagline,

                            address: AppState.site.address,

                            admin_username: newUsername,
                            admin_password: newPass
                        });
