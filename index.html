                this.adminUsername = localStorage.getItem('ST_ADMIN_USER') || 'admin';
                this.adminPassword = localStorage.getItem('ST_ADMIN_PASS') || 'admin123';
                this.lang = localStorage.getItem('ST_LANG') || 'id';

                if (useSupabase && supabaseClient) {
                    try {
                        // 1. Ambil Pengaturan Website
                        const { data: siteData, error: siteErr } = await supabaseClient.from('site_settings').select('*').eq('id', 1).maybeSingle();
                        if (siteData && !siteErr) {
                            this.site = {
                                name: siteData.logo || DEFAULT_SITE.name,
                                tagline: siteData.tagline || DEFAULT_SITE.tagline,
                                logo: siteData.logo || DEFAULT_SITE.logo,
                                email: siteData.email || DEFAULT_SITE.email,
                                phone: siteData.phone || DEFAULT_SITE.phone,
                                whatsapp: siteData.whatsapp || DEFAULT_SITE.whatsapp,
                                address: siteData.address || DEFAULT_SITE.address,
                                socials: {
                                    instagram: siteData.instagram || DEFAULT_SITE.socials.instagram,
                                    facebook: siteData.facebook || DEFAULT_SITE.socials.facebook,
                                    youtube: siteData.youtube || DEFAULT_SITE.socials.youtube
                                },
                                aboutSnippet: siteData.about_snippet || DEFAULT_SITE.aboutSnippet
                            };
                            
                            if (siteData.admin_username) this.adminUsername = siteData.admin_username;
                            if (siteData.admin_password) this.adminPassword = siteData.admin_password;
                        } else {
                            this.site = DEFAULT_SITE;
                        }

                        // 2. Ambil Paket Wisata (Tours)
                        const { data: toursData, error: toursErr } = await supabaseClient.from('tours').select('*').order('created_at', { ascending: true });
                        if (toursData && !toursErr) {
                            this.tours = toursData;
                        } else {
                            this.tours = DEFAULT_TOURS;
                        }

                        // 3. Ambil Galeri Foto Cloud
                        const { data: galleryData, error: galErr } = await supabaseClient.from('gallery').select('*').order('id', { ascending: false });
                        if (galleryData && !galErr) {
                            this.gallery = galleryData;
                        } else {
                            this.gallery = JSON.parse(localStorage.getItem('ST_GALLERY')) || DEFAULT_GALLERY;
                        }

                        // 4. Ambil FAQs
                        const { data: faqData, error: faqErr } = await supabaseClient.from('faqs').select('*').order('id', { ascending: true });
                        if (faqData && !faqErr) {
                            this.faq = faqData;
                        } else {
                            this.faq = DEFAULT_FAQ;
                        }

                        // 5. Ambil Bookings
                        const { data: bookingData, error: bookErr } = await supabaseClient.from('bookings').select('*').order('created_at', { descending: true });
                        if (bookingData && !bookErr) {
                            this.bookings = bookingData;
                        } else {
                            this.bookings = [];
                        }

                    } catch (error) {
                        console.error("Terjadi kegagalan penarikan data dari Supabase:", error);
                        this.loadLocalFallback();
                    }
                } else {
                    this.loadLocalFallback();
                }

                // Pengaturan Hero, Testimoni, & Tim Cadangan Tetap Lokal
                this.hero = JSON.parse(localStorage.getItem('ST_HERO')) || DEFAULT_HERO;
                this.testimonials = JSON.parse(localStorage.getItem('ST_TESTIMONIALS')) || DEFAULT_TESTIMONIALS;
                this.team = JSON.parse(localStorage.getItem('ST_TEAM')) || DEFAULT_TEAM;
            },

            loadLocalFallback() {
                this.site = JSON.parse(localStorage.getItem('ST_SITE')) || DEFAULT_SITE;
                this.tours = JSON.parse(localStorage.getItem('ST_TOURS')) || DEFAULT_TOURS;
                this.gallery = JSON.parse(localStorage.getItem('ST_GALLERY')) || DEFAULT_GALLERY;
                this.faq = JSON.parse(localStorage.getItem('ST_FAQ')) || DEFAULT_FAQ;
                this.bookings = JSON.parse(localStorage.getItem('ST_BOOKINGS')) || [];
                this.adminUsername = localStorage.getItem('ST_ADMIN_USER') || 'admin';
                this.adminPassword = localStorage.getItem('ST_ADMIN_PASS') || 'admin123';
            },

            async save() {
                if (!useSupabase) {
                    localStorage.setItem('ST_SITE', JSON.stringify(this.site));
                    localStorage.setItem('ST_HERO', JSON.stringify(this.hero));
                    localStorage.setItem('ST_TOURS', JSON.stringify(this.tours));
                    localStorage.setItem('ST_GALLERY', JSON.stringify(this.gallery));
                    localStorage.setItem('ST_TESTIMONIALS', JSON.stringify(this.testimonials));
                    localStorage.setItem('ST_FAQ', JSON.stringify(this.faq));
                    localStorage.setItem('ST_TEAM', JSON.stringify(this.team));
                    localStorage.setItem('ST_BOOKINGS', JSON.stringify(this.bookings));
                    localStorage.setItem('ST_ADMIN_USER', this.adminUsername);
                    localStorage.setItem('ST_ADMIN_PASS', this.adminPassword);
                }
            }

            ExportTab: () => {
                const dbJson = JSON.stringify({
                    site: AppState.site,
                    hero: AppState.hero,
                    tours: AppState.tours,
                    gallery: AppState.gallery,
                    faq: AppState.faq
                }, null, 4);

                return `
                    <div class="border-b pb-4 mb-6">
                        <h3 class="text-xl font-bold text-primary">Ekspor Database Konten (JSON)</h3>
                    </div>
                    <div class="space-y-4">
                        <textarea id="db-copy-box" readonly rows="12" class="w-full p-4 font-mono text-xs bg-gray-900 text-green-400 rounded-2xl border-none focus:ring-0 select-all">${dbJson}</textarea>
                        <button onclick="copyToClipboard()" class="bg-primary text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-secondary transition flex items-center gap-2">
                            <i class="ph ph-copy"></i> Salin Data JSON
                        </button>
                    </div>
                `;
            }
        };

        const App = {
            root: document.getElementById('app-root'),
            header: document.getElementById('header-container'),
            footer: document.getElementById('footer-container'),
            loader: document.getElementById('loader'),

            async init() {
                await AppState.init();

                this.header.innerHTML = Components.Header();
                this.footer.innerHTML = Components.Footer();
                
                document.getElementById('floating-wa').href = `https://wa.me/${AppState.site.whatsapp}?text=Halo Sibling Tours, saya ingin menanyakan tentang paket tour premium ke Labuan Bajo.`;

                window.addEventListener('hashchange', () => this.handleRoute());
                window.addEventListener('scroll', this.handleScroll);
                this.setupMobileMenu();

                this.handleRoute();

                setTimeout(() => {
                    this.loader.style.opacity = '0';
                    setTimeout(() => this.loader.style.display = 'none', 500);
                }, 800);
            },

            async handleRoute() {
                const hash = window.location.hash.slice(1) || 'home';
                const parts = hash.split('/');
                const route = parts[0];
                const param = parts[1];

                window.scrollTo({ top: 0, behavior: 'auto' });

                if (route === 'home') {
                    this.header.classList.add('header-transparent');
                    this.header.classList.remove('header-scrolled', 'bg-white', 'text-primary', 'shadow-md');
                } else {
                    this.header.classList.remove('header-transparent');
                    this.header.classList.add('bg-white', 'text-primary', 'shadow-md');
                }

                document.getElementById('mobile-menu').classList.add('translate-x-full');

                let html = '';
                switch (route) {
                    case 'home': html = Views.Home(); break;
                    case 'tours': html = Views.Tours(); break;
                    case 'tour': html = Views.TourDetails(param); break;
                    case 'booking': html = Views.Booking(param); break;
                    case 'gallery': html = Views.Gallery(); break;
                    case 'about': html = Views.About(); break;
                    case 'contact': html = Views.Contact(); break;
                    case 'admin': 
                        html = AppState.isAdminAuthenticated ? AdminView.Dashboard() : AdminView.Login(); 
                        break;
                    default: html = Views.NotFound(); break;
                }

                this.root.innerHTML = html;
                
                // Sinkronisasi Header Navbar
                this.header.innerHTML = Components.Header();
                this.setupMobileMenu();
                
                // Trigger dynamic translations after DOM is rendered
                await translatePageDynamicContent();
                
                setTimeout(() => this.initScrollAnimations(), 100);
            },

            handleScroll() {
                const header = document.getElementById('header-container');
                const isHome = window.location.hash === '' || window.location.hash === '#home';
                
                if (isHome) {
                    if (window.scrollY > 50) {
                        header.classList.add('header-scrolled');
                        header.classList.remove('header-transparent');
                    } else {
                        header.classList.remove('header-scrolled');
                        header.classList.add('header-transparent');
                    }
                }
            },

            setupMobileMenu() {
                const btn = document.getElementById('mobile-menu-btn');
                const closeBtn = document.getElementById('close-menu-btn');
                const menu = document.getElementById('mobile-menu');
                
                if (btn && closeBtn && menu) {
                    btn.addEventListener('click', () => menu.classList.remove('translate-x-full'));
                    closeBtn.addEventListener('click', () => menu.classList.add('translate-x-full'));
                }
            },

            initScrollAnimations() {
                const reveals = document.querySelectorAll('.reveal');
                if(!reveals.length) return;

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });

                reveals.forEach(el => observer.observe(el));
            }
        };

        // Custom Toast Notification Maker
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const bgClass = type === 'success' ? 'bg-emerald-500' : (type === 'info' ? 'bg-blue-500' : 'bg-red-500');
            const iconClass = type === 'success' ? 'ph-check-circle' : (type === 'info' ? 'ph-info' : 'ph-warning');
            
            const toast = document.createElement('div');
            toast.className = `${bgClass} text-white px-5 py-4 rounded-2xl shadow-xl flex items-center gap-3 animate-fade-in-up max-w-sm pointer-events-auto transition-all duration-500 transform translate-y-0 opacity-100`;
            toast.innerHTML = `
                <i class="ph ${iconClass} text-2xl shrink-0"></i>
                <div class="text-sm font-semibold">${message}</div>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Accordion FAQ Toggle
        window.toggleFaq = (index) => {
            const content = document.getElementById(`faq-content-${index}`);
            const icon = document.getElementById(`faq-icon-${index}`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        };

        // Multi-Language Toggle
        window.toggleLangDropdown = () => {
            document.getElementById('lang-dropdown').classList.toggle('hidden');
        };

        window.changeLanguage = (lang) => {
            AppState.lang = lang;

        // =========================================================================
        // AUTOMATIC TRANSLATION ENGINE LOGIC (Indonesian -> English)
        // =========================================================================
        const TranslationCache = {
            get(text, targetLang) {
                const cache = JSON.parse(localStorage.getItem('ST_TRANS_CACHE') || '{}');
                return cache[`${text}_${targetLang}`] || null;
            },
            set(text, targetLang, translatedText) {
                const cache = JSON.parse(localStorage.getItem('ST_TRANS_CACHE') || '{}');
                cache[`${text}_${targetLang}`] = translatedText;
                localStorage.setItem('ST_TRANS_CACHE', JSON.stringify(cache));
            }
        };

        async function fetchTranslation(text, from = 'id', to = 'en') {
            if (!text || text.trim() === '') return '';
            const trimmedText = text.trim();
            const cached = TranslationCache.get(trimmedText, to);
            if (cached) return cached;

            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(trimmedText)}&langpair=${from}|${to}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data && data.responseData && data.responseData.translatedText) {
                    const translated = data.responseData.translatedText;
                    TranslationCache.set(trimmedText, to, translated);
                    return translated;
                }
                return trimmedText; 
            } catch (err) {
                console.warn("Translation API error:", err);
                return trimmedText; 
            }
        }

        async function translatePageDynamicContent() {

                if (!el.hasAttribute('data-original-text')) {
                    el.setAttribute('data-original-text', el.innerText.trim());
                }
                
                const originalText = el.getAttribute('data-original-text');
                
                if (targetLang === 'id') {
                    el.innerText = originalText;
                } else if (targetLang === 'en') {
                    const isCached = TranslationCache.get(originalText, 'en');
                    if (!isCached) {
                        el.classList.add('opacity-50', 'animate-pulse');
                    }
                    
                    const translated = await fetchTranslation(originalText, 'id', 'en');
                    
                    el.innerText = translated;
                    el.classList.remove('opacity-50', 'animate-pulse');
                }
            }
        }

                        AppState.tours.push(newTour);
                    }
                    await AppState.save();
                }

                showToast('Paket tour berhasil disimpan!', 'success');
                closeTourModal();
                await window.renderAdminTab('tours');
            } catch (err) {
                console.error(err);
                showToast('Gagal menyimpan paket tour ke server cloud.', 'error');
            }
        };

        window.deleteTour = async (id) => {
            const confirmed = await showConfirm(
                'Hapus Paket Wisata',
                'Apakah Anda yakin ingin menghapus paket tour ini secara permanen dari server?'
            );
            if (confirmed) {
                showToast('Menghapus paket...', 'info');
                try {
                    if (useSupabase && supabaseClient) {
                        const { error } = await supabaseClient.from('tours').delete().eq('id', id);
                        if (error) throw error;
                    } else {
                        AppState.tours = AppState.tours.filter(t => t.id !== id);
                        await AppState.save();
                    }
                    showToast('Paket tour berhasil dihapus!', 'success');
                    await window.renderAdminTab('tours');
                } catch (err) {
                    console.error(err);
                    showToast('Gagal menghapus paket tour dari server.', 'error');
                }
            }
        };

        // Copy JSON Database helper
        window.copyToClipboard = () => {
            const box = document.getElementById('db-copy-box');
            box.select();
            document.execCommand('copy');
            showToast('Seluruh data JSON disalin ke papan klip!', 'success');
        };

        // Boot the App
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });

    </script>
</body>
</html>
