                        // backup local fallback
                        localStorage.setItem('ST_ADMIN_USER', newUsername);
                        localStorage.setItem('ST_ADMIN_PASS', newPass);
                        await AppState.save();

                        showToast('Keamanan lokal berhasil ditingkatkan!', 'success');
                    }

                    // Logout otomatis untuk memaksa login ulang dengan kredensial baru
                    setTimeout(() => {
                        handleAdminLogout();
                    }, 1500);

                } catch (err) {
                    console.error("Gagal memperbarui keamanan admin:", err);
                    showToast('Gagal mengubah password. Pastikan tabel site_settings Anda sudah mendukung kolom admin_username dan admin_password.', 'error');
                }
            }
        };

        // Booking status update
        window.updateBookingStatus = async (id, newStatus) => {
            showToast('Memperbarui status...', 'info');
            try {
                if (useSupabase && supabaseClient) {
                    const { error } = await supabaseClient.from('bookings').update({ status: newStatus }).eq('id', id);
                    if (error) throw error;
                } else {
                    const booking = AppState.bookings.find(b => b.id === id);
                    if (booking) {
                        booking.status = newStatus;
                        await AppState.save();
                    }
                }
                showToast(`Status booking #${id} diperbarui.`, 'success');
                await window.renderAdminTab('bookings');
            } catch (err) {
                console.error(err);
                showToast('Gagal mengubah status di server.', 'error');
            }
        };

        window.deleteBooking = async (id) => {
            const confirmed = await showConfirm(
                'Hapus Data Booking',
                `Apakah Anda benar-benar yakin ingin menghapus catatan pesanan #${id} dari database?`
            );
            if (confirmed) {
                showToast('Menghapus data...', 'info');
                try {
                    if (useSupabase && supabaseClient) {
                        const { error } = await supabaseClient.from('bookings').delete().eq('id', id);
                        if (error) throw error;
                    } else {
                        AppState.bookings = AppState.bookings.filter(b => b.id !== id);
                        await AppState.save();
                    }
                    showToast('Booking berhasil dihapus.', 'success');
                    await window.renderAdminTab('bookings');
                } catch (err) {
                    console.error(err);
                    showToast('Gagal menghapus booking.', 'error');
                }
            }
        };

        // Tour Packages CRUD Actions
        window.openTourModal = (id = '') => {
            const modal = document.getElementById('tour-modal');
            const titleEl = document.getElementById('modal-title');
            const form = document.getElementById('tour-form');
            form.reset();

            if (id) {
                const tour = AppState.tours.find(t => t.id === id);
                if (tour) {
                    titleEl.innerText = "Edit Detail Paket Tour";
                    document.getElementById('m-tour-id').value = tour.id;
                    document.getElementById('m-title').value = tour.title;
                    document.getElementById('m-slug').value = tour.slug;
                    document.getElementById('m-price').value = tour.price;
                    document.getElementById('m-duration').value = tour.duration;
                    document.getElementById('m-category').value = tour.category;
                    document.getElementById('m-location').value = tour.location;
                    document.getElementById('m-thumbnail').value = tour.thumbnail;
                    document.getElementById('m-description').value = tour.description;
                    document.getElementById('m-highlights').value = tour.highlights;
                    document.getElementById('m-included').value = tour.included;
                    document.getElementById('m-excluded').value = tour.excluded;
                    document.getElementById('m-itinerary').value = tour.itinerary;
                }
            } else {
                titleEl.innerText = "Tambah Paket Tour Baru";
                document.getElementById('m-tour-id').value = '';
            }

            modal.classList.remove('hidden');
        };

        window.closeTourModal = () => {
            document.getElementById('tour-modal').classList.add('hidden');
        };

        window.saveTourData = async () => {
            const form = document.getElementById('tour-form');
            if(!form.checkValidity()) {
                showToast('Harap lengkapi semua bidang isian wajib bintang (*)!', 'error');
                return;
            }

            const id = document.getElementById('m-tour-id').value;
            const targetId = id || 't' + (AppState.tours.length + 1);
            const newTour = {
                id: targetId,
                title: document.getElementById('m-title').value,
                slug: document.getElementById('m-slug').value,
                price: document.getElementById('m-price').value,
                duration: document.getElementById('m-duration').value,
                category: document.getElementById('m-category').value,
                location: document.getElementById('m-location').value,
                thumbnail: document.getElementById('m-thumbnail').value,
                description: document.getElementById('m-description').value,
                highlights: document.getElementById('m-highlights').value,
                included: document.getElementById('m-included').value,
                excluded: document.getElementById('m-excluded').value,
                itinerary: document.getElementById('m-itinerary').value,
                rating: 5.0,
                reviews: 0,
                availability: true
            };

            showToast('Menyinkronkan data paket tour...', 'info');

            try {
                if (useSupabase && supabaseClient) {
                    const { error } = await supabaseClient.from('tours').upsert({
                        id: newTour.id,
                        title: newTour.title,
                        slug: newTour.slug,
                        price: newTour.price,
                        duration: newTour.duration,
                        category: newTour.category,
                        location: newTour.location,
                        thumbnail: newTour.thumbnail,
                        description: newTour.description,
                        highlights: newTour.highlights,
                        included: newTour.included,
                        excluded: newTour.excluded,
                        itinerary: newTour.itinerary
                    });
                    if (error) throw error;
                } else {
                    if (id) {
                        const index = AppState.tours.findIndex(t => t.id === id);
                        if (index !== -1) {
                            newTour.rating = AppState.tours[index].rating;
                            newTour.reviews = AppState.tours[index].reviews;
                            AppState.tours[index] = newTour;
                        }
                    } else {
                        AppState.tours.push(newTour);
                    }
                    await AppState.save();
                }

                showToast('Paket tour berhasil disimpan!', 'success');
                closeTourModal();
                await window.renderAdminTab('tours');
            } catch (err) {
                console.error(err);
                showToast('Gagal menyimpan paket tour ke server cloud.', 'error');
            }
        };

        window.deleteTour = async (id) => {
            const confirmed = await showConfirm(
                'Hapus Paket Wisata',
                'Apakah Anda yakin ingin menghapus paket tour ini secara permanen dari server?'
            );
            if (confirmed) {
                showToast('Menghapus paket...', 'info');
                try {
                    if (useSupabase && supabaseClient) {
                        const { error } = await supabaseClient.from('tours').delete().eq('id', id);
                        if (error) throw error;
                    } else {
                        AppState.tours = AppState.tours.filter(t => t.id !== id);
                        await AppState.save();
                    }
                    showToast('Paket tour berhasil dihapus!', 'success');
                    await window.renderAdminTab('tours');
                } catch (err) {
                    console.error(err);
                    showToast('Gagal menghapus paket tour dari server.', 'error');
                }
            }
        };

        // Copy JSON Database clipboard helper
        window.copyToClipboard = () => {
            const box = document.getElementById('db-copy-box');
            box.select();
            document.execCommand('copy');
            showToast('Seluruh data JSON disalin ke papan klip!', 'success');
        };

        // Boot the App
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });

    </script>
</body>
</html>
